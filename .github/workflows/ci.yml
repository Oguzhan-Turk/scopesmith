name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: scopesmith
          POSTGRES_USER: scopesmith
          POSTGRES_PASSWORD: scopesmith_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scopesmith"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/scopesmith
      DB_USERNAME: scopesmith
      DB_PASSWORD: scopesmith_dev
      ANTHROPIC_API_KEY: dummy
      OPENAI_API_KEY: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend Tests
        working-directory: backend
        run: ./mvnw test

      - name: Frontend Install
        working-directory: frontend
        run: npm ci

      - name: Frontend Lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Browser
        working-directory: frontend
        run: npm run e2e:install

      - name: Start Backend
        working-directory: backend
        run: nohup ./mvnw spring-boot:run > /tmp/backend.log 2>&1 &

      - name: Wait Backend Ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/backend.log || true
          exit 1

      - name: E2E Smoke
        working-directory: frontend
        env:
          SMOKE_CLEANUP: "true"
        run: npm run e2e:smoke

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Upload Backend Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          if-no-files-found: ignore
