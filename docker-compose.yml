services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: scopesmith-db
    environment:
      POSTGRES_DB: scopesmith
      POSTGRES_USER: scopesmith
      POSTGRES_PASSWORD: scopesmith_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scopesmith"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
