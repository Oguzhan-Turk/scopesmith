spring:
  application:
    name: ScopeSmith

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/scopesmith}
    username: ${DB_USERNAME:scopesmith}
    password: ${DB_PASSWORD:scopesmith_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  ai:
    model:
      chat: anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
    openai:
      api-key: ${OPENAI_API_KEY:NO_OPENAI_KEY}
      embedding:
        options:
          model: text-embedding-3-small

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

github:
  token: ${GITHUB_TOKEN:}
  repo: ${GITHUB_REPO:}

jira:
  url: ${JIRA_URL:}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  project-key: ${JIRA_PROJECT_KEY:SS}

scopesmith:
  models:
    light: claude-haiku-4-5-20251001
    standard: claude-sonnet-4-20250514
    premium: claude-opus-4-6
  pricing:
    light:
      input-per-million: 1.00
      output-per-million: 5.00
    standard:
      input-per-million: 3.00
      output-per-million: 15.00
    premium:
      input-per-million: 5.00
      output-per-million: 25.00

  features:
    managed-agent-enabled: ${MANAGED_AGENT_ENABLED:false}

server:
  port: 8080

logging:
  level:
    com.scopesmith: DEBUG
    org.hibernate.SQL: WARN
