spring:
  application:
    name: ScopeSmith

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/scopesmith}
    username: ${DB_USERNAME:scopesmith}
    password: ${DB_PASSWORD:scopesmith_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ScopeSmithPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 20000      # ms — fail fast if pool is exhausted
      idle-timeout: 300000           # ms — evict idle connections after 5 min
      max-lifetime: 1200000          # ms — recycle connections every 20 min

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  ai:
    model:
      chat: anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      connection-timeout: 10s        # TCP connection to Anthropic API
      read-timeout: 120s             # Streaming / long analysis calls can take 60-90s
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
    openai:
      api-key: ${OPENAI_API_KEY:NO_OPENAI_KEY}
      embedding:
        options:
          model: text-embedding-3-small

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

github:
  token: ${GITHUB_TOKEN:}
  repo: ${GITHUB_REPO:}

jira:
  url: ${JIRA_URL:}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  project-key: ${JIRA_PROJECT_KEY:SS}

scopesmith:
  models:
    light: claude-haiku-4-5-20251001
    standard: claude-sonnet-4-20250514
    premium: claude-opus-4-6
  pricing:
    light:
      input-per-million: 1.00
      output-per-million: 5.00
    standard:
      input-per-million: 3.00
      output-per-million: 15.00
    premium:
      input-per-million: 5.00
      output-per-million: 25.00

  features:
    managed-agent-enabled: ${MANAGED_AGENT_ENABLED:true}
    self-assistant-enabled: ${SELF_ASSISTANT_ENABLED:false}
  scan:
    allowed-roots: ${SCOPESMITH_SCAN_ALLOWED_ROOTS:${user.home}}
  insights:
    cross-project-enabled: ${SCOPESMITH_INSIGHTS_CROSS_PROJECT_ENABLED:false}
  assistant:
    ai-enabled: ${SCOPESMITH_ASSISTANT_AI_ENABLED:true}
    ai-min-question-length: ${SCOPESMITH_ASSISTANT_AI_MIN_QUESTION_LENGTH:10}
    ai-max-question-length: ${SCOPESMITH_ASSISTANT_AI_MAX_QUESTION_LENGTH:600}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never   # don't expose DB credentials / internals

server:
  port: 8080
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        same-site: Lax
        secure: ${SCOPESMITH_SESSION_COOKIE_SECURE:false}

logging:
  level:
    com.scopesmith: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
