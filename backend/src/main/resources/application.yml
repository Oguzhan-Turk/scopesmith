spring:
  application:
    name: ScopeSmith

  datasource:
    url: jdbc:postgresql://localhost:5432/scopesmith
    username: scopesmith
    password: scopesmith_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096

server:
  port: 8080

logging:
  level:
    com.scopesmith: DEBUG
    org.hibernate.SQL: WARN
