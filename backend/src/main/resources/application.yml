spring:
  application:
    name: ScopeSmith

  datasource:
    url: jdbc:postgresql://localhost:5432/scopesmith
    username: scopesmith
    password: scopesmith_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096

github:
  token: ${GITHUB_TOKEN:}
  repo: ${GITHUB_REPO:}

jira:
  url: ${JIRA_URL:}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  project-key: ${JIRA_PROJECT_KEY:SS}

server:
  port: 8080

logging:
  level:
    com.scopesmith: DEBUG
    org.hibernate.SQL: WARN
